<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>模型切換</title>

    <!-- Babylon Viewer -->
    <script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>

    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial;
        }

        h1 {
            margin-bottom: 10px;
        }

        select {
            font-size: 16px;
            padding: 5px;
            margin-bottom: 10px;
        }

        .viewerContainer {
            width: 500px;
            height: 600px;
            background: #000;
        }

        babylon {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>

<h1>我改這個</h1>

<select onchange="loadit(this.value)">
    <option value="models/cac-1777347116869.glb">girl.glb</option>
    <option value="models/cac-1777347116869.glb">girl1.glb</option>
    <option value="models/cac-1777347116869.glb">girl2.glb</option>
</select>

<div class="viewerContainer">
    <!-- 預設載入 -->
    <babylon id="viewerID" model="models/cac-1777347116869.glb"></babylon>
</div>

<script>
function loadit(modelUrl) {
    if (!modelUrl) return;

    const viewer = BabylonViewer.viewerManager.getViewerById("viewerID");

    viewer.loadModel({
        url: modelUrl
    });
}
</script>

</body>
</html>
