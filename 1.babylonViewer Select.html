<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Selector</title>

    <script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        .viewerContainer {
            width: 500px;
            height: 600px;
            margin-top: 20px;
            background: #000;
        }

        babylon {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>

    <script>
        function loadit(modelUrl) {
            if (!modelUrl) return;

            const viewer = BabylonViewer.viewerManager.getViewerById("viewerID");

            viewer.loadModel({
                url: modelUrl
            });
        }
    </script>
</head>

<body>

<h2>Select Model</h2>

<select onchange="loadit(this.value)">
    <option value="">select model</option>

    <!-- 原本的 -->
    <option value="alice.glb">Alice</option>
    <option value="Astronaut.glb">Astronaut</option>
    <option value="stacy_lightweight.glb">Stacy</option>

    <!-- 你的模型 -->
    <option value="cac-1774423884809.glb">My Model</option>
</select>

<div class="viewerContainer">
    <!-- 預設顯示 Alice -->
    <babylon id="viewerID" model="alice.glb"></babylon>
</div>

</body>
</html>
