<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>模型選擇</title>

    <script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>

    <style>
        .viewerContainer {
            width: 500px;
            height: 625px;
            background: #ccc;
        }

        babylon {
            width: 100%;
            height: 100%;
            display: block;
        }

        select {
            width: 120px;
            font-size: 16px;
        }
    </style>
</head>

<body>

<select id="modelSelect" onchange="loadit(this.value)">
    <option value="models/girl.glb">girl.glb</option>
    <option value="models/girl1.glb">girl1.glb</option>
    <option value="models/girl2.glb">girl2.glb</option>
</select>

<div class="viewerContainer">
    <babylon id="viewerID" model="models/girl.glb"></babylon>
</div>

<script>
    function loadit(modelUrl) {
        const viewer = BabylonViewer.viewerManager.getViewerById("viewerID");

        viewer.loadModel({
            url: modelUrl
        });
    }
</script>

</body>
</html>
