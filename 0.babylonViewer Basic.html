<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BabylonJS Viewer</title>

    <!-- Babylon Viewer -->
    <script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        babylon {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>
    <!-- 注意 model 路徑 -->
    <babylon model="models/girl.glb"></babylon>
</body>
</html>
