<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BabylonJS Viewer</title>

    <script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>

    <style>
        .viewerContainer {
            width: 400px;
            height: 500px;
            background: #000;
        }

        babylon {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>

    <script>
        function loadit(modelUrl) {
            if (modelUrl) {
                let viewer = BabylonViewer.viewerManager.getViewerById("viewerID");
                viewer.loadModel(modelUrl);
            }
        }
    </script>
</head>

<body>

<select onchange="loadit(this.value)">
    <option value="">select model</option>
    <option value="./models/cac-1777347116869.glb">cac-1777347116869.glb</option>
</select>

<div class="viewerContainer">
    <babylon id="viewerID" model="./models/cac-1777347116869.glb">
        <vr></vr>
    </babylon>
</div>

</body>
</html>
